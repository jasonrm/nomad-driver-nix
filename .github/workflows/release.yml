name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PLUGIN_BINARY: nomad-driver-nix

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cgo: "1"
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            cgo: "1"
          - goos: darwin
            goarch: amd64
            runner: ubuntu-latest
            cgo: "0"
          - goos: darwin
            goarch: arm64
            runner: ubuntu-latest
            cgo: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux build dependencies
        if: matrix.cgo == '1'
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev

      - name: Build
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "${PLUGIN_BINARY}" \
            .

      - name: Package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          ARCHIVE="${PLUGIN_BINARY}_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
          tar czf "${ARCHIVE}" "${PLUGIN_BINARY}"
          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_BINARY }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ${{ env.PLUGIN_BINARY }}-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz | tee checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt